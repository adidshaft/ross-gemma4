name: Feature request
description: Suggest an improvement for Ross Gemma4.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and safety notes
      description: Does this touch private case data, network access, model downloads, or legal-output safeguards?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
