name: Bug report
description: Report a reproducible problem in Ross Gemma4.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please use synthetic data only. Do not attach private case files, secrets, model weights, or logs containing personal data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps using synthetic data.
      placeholder: |
        1. Open...
        2. Tap...
        3. See...
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "iOS device, iOS simulator, Android device, backend"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Relevant logs or screenshots
      description: Redact personal data and do not include secrets.
