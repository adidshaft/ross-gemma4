name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  repo-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check cloud LLM dependencies
        run: bash scripts/ci/check-no-cloud-llm.sh
      - name: Check analytics SDKs
        run: bash scripts/ci/check-no-analytics.sh
      - name: Check bundled asset size
        run: bash scripts/ci/check-no-large-model-assets.sh
      - name: Check onboarding copy boundary
        run: bash scripts/ci/check-onboarding-copy-boundary.sh

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm install
      - name: Run tests
        run: npm test

  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  ios-simulator-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build Ross for iOS Simulator
        run: |
          xcodebuild \
            -project ios/Ross.xcodeproj \
            -scheme Ross \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  ios-real-device-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macOS, iOS-device]
    steps:
      - uses: actions/checkout@v4
      - name: Verify attached iPhone
        run: |
          xcrun xctrace list devices | grep -E 'iPhone|iPad'
      - name: Build for attached iPhone
        run: |
          xcodebuild \
            -project ios/Ross.xcodeproj \
            -scheme Ross \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            build
