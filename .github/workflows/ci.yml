name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  repo-guards:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ross
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check cloud LLM dependencies
        run: bash scripts/ci/check-no-cloud-llm.sh
      - name: Check analytics SDKs
        run: bash scripts/ci/check-no-analytics.sh
      - name: Check bundled asset size
        run: bash scripts/ci/check-no-large-model-assets.sh
      - name: Check onboarding copy boundary
        run: bash scripts/ci/check-onboarding-copy-boundary.sh

  rust-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ross/core/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cargo test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ross/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ross/backend/package-lock.json
      - name: Install deps
        run: npm install
      - name: Run tests
        run: npm test
